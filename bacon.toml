default_job = "start"

[jobs.start]
command = ["bash", "-c", "set -o allexport; [ -f .env.dev ] && source .env.dev; set +o allexport; exec cargo loco start"]
need_stdout = true
on_change_strategy = "kill_then_restart"

[jobs.e2e]
command = ["bash", "-c", "set -o allexport; [ -f .env.dev ] && source .env.dev; set +o allexport; pnpm --dir e2e test"]
need_stdout = true

[jobs.check]
command = ["cargo", "check", "--color", "always"]
need_stdout = false

[jobs.clippy]
command = ["cargo", "clippy", "--all-targets", "--color", "always"]
need_stdout = false

[jobs.test]
command = ["cargo", "test", "--color", "always"]
need_stdout = true

[keybindings]
s = "job:start"
e = "job:e2e"
c = "job:check"
l = "job:clippy"
t = "job:test"
